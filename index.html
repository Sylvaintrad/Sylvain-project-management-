<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#6C5CE7"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Orbit"/>
<meta name="description" content="Orbit — Gestion de projet personnelle avec IA"/>
<link rel="manifest" id="pwa-manifest"/>
<title>Orbit — Gestion de projet</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --bg:#ffffff;--bg2:#f8f7ff;--bg3:#f0effe;
  --tx:#16141f;--tx2:#6b6880;--tx3:#a09db8;
  --bd:rgba(108,92,231,.1);--bd2:rgba(108,92,231,.22);
  --acc:#6C5CE7;--accl:#EEF0FF;--accd:#4834d4;
  --acc2:#a29bfe;--acc3:#fd79a8;
  --ok:#00b894;--err:#e17055;--warn:#fdcb6e;
  --r:10px;--rl:16px;
  --grad:linear-gradient(135deg,#6C5CE7,#a29bfe);
  --shadow:0 4px 24px rgba(108,92,231,.12);
  --shadow-sm:0 2px 8px rgba(108,92,231,.08);
}
[data-theme=dark]{--bg:#0f0e17;--bg2:#1a1826;--bg3:#221f33;--tx:#fffffe;--tx2:#a7a4c0;--tx3:#6b6880;--bd:rgba(162,155,254,.1);--bd2:rgba(162,155,254,.2);--accl:#2d2757;--acc2:#a29bfe;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg3);color:var(--tx);height:100vh;height:100dvh;overflow:hidden;-webkit-text-size-adjust:100%}
.app{display:grid;grid-template-columns:220px 1fr 280px;height:100vh;height:100dvh;background:var(--bg)}

/* ── MOBILE BOTTOM NAV ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--bd);z-index:500;padding:6px 0 env(safe-area-inset-bottom,6px);grid-template-columns:repeat(5,1fr)}
.mobile-nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;cursor:pointer;color:var(--tx3);font-size:9px;font-weight:500;border:none;background:none;transition:color .15s}
.mobile-nav-btn.active{color:var(--acc)}
.mobile-nav-btn i{font-size:20px}
[data-theme=dark] .mobile-nav{background:rgba(15,14,23,.92)}

/* ── MOBILE SIDEBAR DRAWER ── */
.sb-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;backdrop-filter:blur(3px)}
.sb-drawer-overlay.open{display:block}

@media (max-width:768px){
  body{overflow:hidden}
  .app{grid-template-columns:1fr;grid-template-rows:1fr;height:100dvh}
  .sb{position:fixed;left:-100%;top:0;bottom:0;width:80%;max-width:300px;z-index:700;transition:left .25s cubic-bezier(.34,1.26,.64,1);box-shadow:4px 0 30px rgba(108,92,231,.2)}
  .sb.open{left:0}
  .agent{display:none;position:fixed;bottom:0;left:0;right:0;height:65vh;border-left:none;border-top:1px solid var(--bd);border-radius:20px 20px 0 0;z-index:650;transition:transform .3s cubic-bezier(.34,1.26,.64,1);transform:translateY(100%);box-shadow:0 -8px 40px rgba(108,92,231,.2)}
  .agent.open{transform:translateY(0)}
  .main{grid-column:1;display:flex;flex-direction:column;overflow:hidden;padding-bottom:calc(60px + env(safe-area-inset-bottom,0px))}
  .mobile-nav{display:grid}
  .topbar{padding:.55rem .85rem}
  .topbar h1{font-size:14px}
  .vtabs{padding:0 .85rem;overflow-x:auto;scrollbar-width:none}
  .vtabs::-webkit-scrollbar{display:none}
  .vtab{font-size:11px;padding:6px 8px;white-space:nowrap}
  .board{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:.75rem}
  .syncbar{padding:3px .85rem;font-size:10px}
  /* Hide some desktop-only elements */
  .proj-name-edit{max-width:130px;font-size:13px}
  /* Task panel full screen on mobile */
  .task-panel{width:100%;max-width:100%;max-height:90dvh;border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0}
  .task-panel-overlay{align-items:flex-end}
  /* Modals full width */
  .modal-box{width:95%;max-width:95vw;border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:85dvh}
  .modal-overlay{align-items:flex-end}
  /* Search full width */
  .search-box{width:95%;border-radius:16px}
  .search-overlay{padding-top:40px}
  /* Quick notes */
  .qnotes-panel{right:0;left:0;width:100%;border-radius:20px 20px 0 0}
  /* Two col → one col on small screens */
  .two{grid-template-columns:1fr}
  .task-meta-row{grid-template-columns:1fr 1fr}
  /* Agent panel full */
  .agh{border-radius:20px 20px 0 0}
}
.sb{background:var(--bg);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;box-shadow:2px 0 20px rgba(108,92,231,.04)}
.sb-logo{padding:.9rem 1rem;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sb-logo-l{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-logo-l i{font-size:20px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:16px;padding:2px;display:flex;align-items:center}
.icon-btn:hover{color:var(--tx2)}
.sb-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;padding:0 1rem;margin:.6rem 0 .25rem}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px .75rem;font-size:13px;cursor:pointer;color:var(--tx2);transition:all .12s;border-radius:var(--r);margin:0 .4rem}
.sb-item:hover{background:var(--accl);color:var(--acc)}
.sb-item.active{color:var(--acc);font-weight:600;background:var(--accl)}
.sb-item i{font-size:15px;flex-shrink:0}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-foot{margin-top:auto;border-top:.5px solid var(--bd);padding:.5rem 0}
.plist{overflow-y:auto;flex:1;padding:0 .4rem}
.sb-proj-item{display:flex;align-items:center;gap:8px;padding:6px 1rem;font-size:13px;cursor:pointer;color:var(--tx2);transition:background .1s;position:relative}
.sb-proj-item:hover{background:var(--bg)}
.sb-proj-item.active{color:var(--tx);font-weight:500;background:var(--bg)}
.sb-proj-del{display:none;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;padding:2px 4px;margin-left:auto;border-radius:var(--r);flex-shrink:0}
.sb-proj-del:hover{color:var(--err);background:var(--bg2)}
.sb-proj-item:hover .sb-proj-del{display:flex;align-items:center}
.add-proj{display:flex;align-items:center;gap:5px;padding:5px 1rem;font-size:12px;color:var(--tx3);cursor:pointer}
.add-proj:hover{color:var(--tx2)}
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.4rem;border-bottom:1px solid var(--bd);flex-shrink:0}
.topbar h1{font-size:15px;font-weight:600}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--accl);color:var(--acc);border:1px solid rgba(108,92,231,.2);font-weight:600}
.vtabs{display:flex;padding:0 1.4rem;border-bottom:1px solid var(--bd);flex-shrink:0}
.vtab{font-size:12px;padding:7px 10px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap}
.vtab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.vtab i{font-size:14px}
.vc{flex:1;overflow:hidden;display:flex;flex-direction:column}
.btn{font-size:12px;padding:5px 11px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .1s;white-space:nowrap;font-family:inherit}
.btn:hover{background:var(--bg2)}
.btn.pri{background:var(--grad);color:#fff;border:none;box-shadow:0 4px 14px rgba(108,92,231,.35)}
.btn.pri:hover{opacity:.9;box-shadow:0 6px 20px rgba(108,92,231,.45);transform:translateY(-1px)}
.btn.red{color:#A32D2D;border-color:#F09595}
.btn.red:hover{background:#FCEBEB}
.fi,.fs,.ft{width:100%;font-size:13px;padding:6px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:inherit}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(83,74,183,.12)}
.ft{resize:vertical;line-height:1.6}
.flbl{font-size:12px;font-weight:500;color:var(--tx2);display:flex;align-items:center;gap:5px;margin-bottom:4px}
.fdesc{font-size:11px;color:var(--tx3);margin-bottom:5px}
.ft.risks{border-left:3px solid var(--err);border-radius:0 var(--r) var(--r) 0}
.ft.comments{border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0}
.board{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:1rem;overflow-y:auto;align-content:start;flex:1}
.kcol{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:.75rem;display:flex;flex-direction:column;gap:7px;min-height:80px}
.kch{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.kct{font-size:11px;font-weight:600;color:var(--tx2);display:flex;align-items:center;gap:6px}
.kcc{font-size:10px;background:var(--bg);border:.5px solid var(--bd);border-radius:20px;padding:1px 6px;color:var(--tx3)}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:.55rem .7rem;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm)}
.card:hover{border-color:var(--acc2);box-shadow:var(--shadow);transform:translateY(-2px)}
.card-del{display:none;background:none;border:none;cursor:pointer;color:var(--tx3);font-size:12px;padding:1px 3px;border-radius:var(--r);flex-shrink:0;line-height:1}
.card-del:hover{color:var(--err)}
.card:hover .card-del{display:flex;align-items:center}
.ctag{font-size:9px;padding:2px 6px;border-radius:var(--r);font-weight:600;display:inline-block;margin-bottom:4px}
.ctitle{font-size:12px;line-height:1.4;margin-bottom:5px}
.cft{display:flex;align-items:center;justify-content:space-between}
.avs{display:flex}
.av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;border:1.5px solid var(--bg);margin-left:-4px}
.av:first-child{margin-left:0}
.prio{width:6px;height:6px;border-radius:50%}
.addcard{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx3);padding:3px 2px;cursor:pointer}
.addcard:hover{color:var(--tx2)}
.crpage{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem}
.sbox{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:1.1rem;box-shadow:var(--shadow-sm)}
.stitle{font-size:13px;font-weight:500;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.atbl{width:100%;border-collapse:collapse;font-size:12px}
.atbl th{font-size:11px;font-weight:500;color:var(--tx3);text-align:left;padding:5px 8px;border-bottom:.5px solid var(--bd)}
.atbl td{padding:5px 8px;border-bottom:.5px solid var(--bd);vertical-align:middle}
.atbl tr:last-child td{border-bottom:none}
.atbl tbody tr:hover td{background:var(--bg)}
.spill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;display:inline-block}
.dbadge{font-size:11px;padding:2px 8px;border-radius:var(--r);display:inline-block}
.rtag{background:#FCEBEB;color:#A32D2D;font-size:10px;padding:2px 7px;border-radius:20px;border:.5px solid #F09595}
.planpage{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.gantt-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--bd)}
.gantt-row:last-child{border-bottom:none}
.glabel{width:140px;flex-shrink:0;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.gtrack{flex:1;height:14px;position:relative;background:var(--bg2);border-radius:3px}
.gbar{height:100%;border-radius:3px;position:absolute;display:flex;align-items:center;padding:0 5px;overflow:hidden}
.gbarlbl{font-size:8px;white-space:nowrap;color:#fff}
.odot{width:6px;height:6px;border-radius:50%;background:var(--err);display:inline-block;flex-shrink:0}
.agent{border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);position:relative}
.agh{padding:.85rem 1rem;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(255,255,255,.7);backdrop-filter:blur(10px)}
.agav{width:34px;height:34px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(108,92,231,.4)}
.msgs{flex:1;overflow-y:auto;padding:.6rem;display:flex;flex-direction:column;gap:6px}
.msg{font-size:11px;line-height:1.5}
.msg.ag{background:rgba(255,255,255,.8);border:1px solid rgba(108,92,231,.12);border-radius:4px 14px 14px 14px;padding:.5rem .75rem;color:var(--tx);box-shadow:0 2px 8px rgba(108,92,231,.06);backdrop-filter:blur(8px)}
.msg.usr{background:var(--grad);color:#fff;border-radius:14px 4px 14px 14px;padding:.5rem .75rem;align-self:flex-end;box-shadow:0 4px 14px rgba(108,92,231,.35)}
.msg.typ{background:rgba(255,255,255,.6);border:1px solid var(--bd);border-radius:4px 14px 14px 14px;padding:.5rem .75rem;color:var(--tx3);font-style:italic;backdrop-filter:blur(8px)}
.suggs{display:flex;flex-direction:column;gap:3px;padding:.4rem .6rem;border-top:.5px solid var(--bd);flex-shrink:0}
.sugg{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid rgba(108,92,231,.2);background:rgba(255,255,255,.7);cursor:pointer;color:var(--acc);text-align:left;font-family:inherit;font-weight:500;transition:all .12s;backdrop-filter:blur(4px)}
.sugg:hover{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(108,92,231,.3)}
.chatia{display:flex;gap:6px;padding:.65rem .75rem;border-top:1px solid var(--bd);flex-shrink:0;background:rgba(255,255,255,.7);backdrop-filter:blur(10px)}
.chatia input{flex:1;font-size:12px;padding:7px 12px;border-radius:20px;border:1.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:inherit;transition:all .15s}
.chatia input:focus{outline:none;border-color:var(--acc)}
.sbtn{width:32px;height:32px;border-radius:50%;background:var(--grad);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(108,92,231,.4);transition:all .15s}
.sbtn:hover{transform:scale(1.1);box-shadow:0 6px 18px rgba(108,92,231,.5)}
.syncbar{display:flex;align-items:center;gap:6px;padding:4px 1.25rem;border-bottom:.5px solid var(--bd);font-size:11px;color:var(--tx3);flex-shrink:0;background:var(--bg2)}
.syncbar i{font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--tx3);padding:2rem}
.empty i{font-size:32px}
.empty p{font-size:12px;text-align:center;line-height:1.5}
.crcard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);padding:.75rem .95rem;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm)}
.crcard:hover{border-color:var(--acc2);box-shadow:var(--shadow);transform:translateY(-1px)}
/* Attachments & Links */
.attach-item{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--bg);border:.5px solid var(--bd);border-radius:var(--r);font-size:12px}
.attach-item a{color:var(--acc);text-decoration:none;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.attach-item a:hover{text-decoration:underline}
.attach-icon{font-size:15px;color:var(--tx3);flex-shrink:0}
/* Calendar */
.cal-wrap{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.cal-dname{text-align:center;font-size:10px;font-weight:600;color:var(--tx3);padding:3px 0}
.cal-day{min-height:64px;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:4px;transition:border-color .1s}
.cal-day:hover{border-color:var(--bd2)}
.cal-day.today{border-color:var(--acc);background:var(--accl)}
.cal-day.other-month{opacity:.35}
.cal-day-num{font-size:11px;font-weight:500;margin-bottom:3px;color:var(--tx2)}
.cal-day.today .cal-day-num{color:var(--acc);font-weight:700}
.cal-event{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{background:none;border:.5px solid var(--bd2);border-radius:var(--r);padding:3px 8px;cursor:pointer;color:var(--tx2);font-size:12px;font-family:inherit}
.cal-nav button:hover{background:var(--bg2)}
/* Auth overlay */
/* Alert banner */
.alert-banner{background:#FAEEDA;border-bottom:.5px solid #EFB96A;padding:6px 1.25rem;display:flex;align-items:center;gap:8px;font-size:11px;color:#633806;flex-shrink:0}
.alert-banner i{font-size:14px;flex-shrink:0}
.alert-banner-items{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.alert-pill{background:#fff;border:.5px solid #EFB96A;border-radius:20px;padding:2px 8px;cursor:pointer;white-space:nowrap}
.alert-pill:hover{background:#FEF3E2}
.alert-pill.overdue{background:#FCEBEB;border-color:#F09595;color:#A32D2D}
/* Search overlay */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:80px}
.search-box{background:var(--bg);border-radius:var(--rl);width:560px;max-width:90vw;border:.5px solid var(--bd2);overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.18)}
.search-input-wrap{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:.5px solid var(--bd)}
.search-input-wrap i{font-size:18px;color:var(--tx3)}
.search-input-wrap input{flex:1;border:none;background:transparent;font-size:14px;color:var(--tx);outline:none;font-family:inherit}
.search-results{max-height:360px;overflow-y:auto}
.search-group{padding:6px 16px 2px;font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}
.search-result{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background .1s}
.search-result:hover{background:var(--bg2)}
.search-result i{font-size:15px;color:var(--tx3);flex-shrink:0}
.search-result-main{flex:1;overflow:hidden}
.search-result-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-sub{font-size:11px;color:var(--tx3)}
.search-empty{padding:2rem;text-align:center;color:var(--tx3);font-size:12px}
/* Quick notes */
.qnotes-panel{position:fixed;bottom:0;right:270px;width:300px;background:var(--bg);border:.5px solid var(--bd2);border-bottom:none;border-radius:var(--rl) var(--rl) 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.1);z-index:150;transform:translateY(100%);transition:transform .25s}
.qnotes-panel.open{transform:translateY(0)}
.qnotes-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;border-bottom:.5px solid var(--bd);background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0}
.qnotes-hd span{font-size:12px;font-weight:500;flex:1}
.qnotes-body{padding:8px}
.qnotes-list{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.qnote-item{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:6px 8px;font-size:11px;line-height:1.5;display:flex;gap:6px;align-items:flex-start}
.qnote-item span{flex:1}
.qnotes-add{display:flex;gap:5px}
.qnotes-add input{flex:1;font-size:11px;padding:4px 8px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:inherit}
.qnotes-add input:focus{outline:none;border-color:var(--acc)}
/* Templates modal */
.modal-overlay{position:fixed;inset:0;background:rgba(16,14,28,.5);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.modal-box{background:var(--bg);border-radius:20px;width:500px;max-width:92vw;border:1px solid var(--bd2);overflow:hidden;box-shadow:0 24px 64px rgba(108,92,231,.2)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:.5px solid var(--bd)}
.modal-hd h2{font-size:14px;font-weight:600}
.modal-body{padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.6rem;max-height:400px;overflow-y:auto}
.tpl-card{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:.75rem;cursor:pointer;transition:border-color .12s}
.tpl-card:hover{border-color:var(--acc)}
.tpl-card h3{font-size:13px;font-weight:500;margin-bottom:3px}
.tpl-card p{font-size:11px;color:var(--tx2)}
/* Status editor */
.status-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:.5px solid var(--bd2)}
/* Voice assistant */
.voice-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.6);border:1.5px solid rgba(108,92,231,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--acc);transition:all .2s;flex-shrink:0;backdrop-filter:blur(8px)}
.voice-btn:hover{background:var(--accl);border-color:var(--acc);box-shadow:0 3px 10px rgba(108,92,231,.25)}
.voice-btn.listening{background:var(--err);border-color:var(--err);color:#fff;animation:pulse 1s ease-in-out infinite}
.voice-btn.speaking{background:var(--acc);border-color:var(--acc);color:#fff;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(83,74,183,.4)}50%{box-shadow:0 0 0 6px rgba(83,74,183,0)}}
.voice-status{font-size:10px;color:var(--tx3);padding:4px 9px;border-top:1px solid var(--bd);text-align:center;flex-shrink:0;min-height:24px;display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(108,92,231,.03)}
.voice-status.active{color:var(--acc)}
.voice-status.listening{color:var(--err)}
.voice-wave{display:flex;align-items:center;gap:2px;height:12px}
.voice-wave span{display:inline-block;width:2px;background:var(--err);border-radius:2px;animation:wave .8s ease-in-out infinite}
.voice-wave span:nth-child(2){animation-delay:.1s}
.voice-wave span:nth-child(3){animation-delay:.2s}
.voice-wave span:nth-child(4){animation-delay:.3s}
@keyframes wave{0%,100%{height:3px}50%{height:10px}}
/* Task detail panel */
.task-panel-overlay{position:fixed;inset:0;background:rgba(16,14,28,.5);z-index:400;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.task-panel{background:var(--bg);border-radius:20px;width:560px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;border:1px solid var(--bd2);box-shadow:0 24px 64px rgba(108,92,231,.2);overflow:hidden}
.task-panel-hd{display:flex;align-items:flex-start;gap:10px;padding:1rem 1.25rem;border-bottom:.5px solid var(--bd)}
.task-panel-title{flex:1;font-size:15px;font-weight:600;border:none;background:transparent;color:var(--tx);outline:none;font-family:inherit;resize:none;line-height:1.4}
.task-panel-title:focus{color:var(--acc)}
.task-panel-body{overflow-y:auto;flex:1;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:1rem}
.task-meta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
.task-meta-item{display:flex;flex-direction:column;gap:4px}
.task-meta-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
.task-desc-area{width:100%;font-size:13px;line-height:1.7;padding:8px 10px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx);resize:none;font-family:inherit;min-height:80px}
.task-desc-area:focus{outline:none;border-color:var(--acc);background:var(--bg)}
.comment-item{display:flex;gap:8px;padding:6px 0;border-bottom:.5px solid var(--bd)}
.comment-item:last-child{border-bottom:none}
.comment-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;margin-top:1px}
.comment-body{flex:1}
.comment-author{font-size:11px;font-weight:500;margin-bottom:2px}
.comment-text{font-size:12px;line-height:1.5;color:var(--tx2)}
.comment-date{font-size:10px;color:var(--tx3);margin-top:2px}
.comment-add{display:flex;gap:6px;align-items:flex-start;margin-top:4px}
.comment-input{flex:1;font-size:12px;padding:6px 9px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg2);color:var(--tx);font-family:inherit;resize:none;min-height:38px}
.comment-input:focus{outline:none;border-color:var(--acc);background:var(--bg)}
/* Editable project name */
.proj-name-edit{font-size:15px;font-weight:600;border:none;background:transparent;color:var(--tx);outline:none;font-family:inherit;min-width:60px;max-width:200px}
.proj-name-edit:focus{border-bottom:1.5px solid var(--acc);color:var(--acc)}
/* Contacts */
.contact-card{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--rl);padding:.75rem 1rem;display:flex;align-items:flex-start;gap:10px}
.contact-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.contact-body{flex:1;overflow:hidden}
.contact-name{font-size:13px;font-weight:500;margin-bottom:2px}
.contact-role{font-size:11px;color:var(--tx3);margin-bottom:4px}
.contact-email{font-size:12px;color:var(--acc);text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-email:hover{text-decoration:underline}
.contact-notes{font-size:11px;color:var(--tx2);margin-top:4px;line-height:1.4}
.contact-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
/* Color picker */
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin:.5rem 0}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:var(--tx);transform:scale(1.1)}
/* Risk badge */
.risk-auto-badge{background:#FCEBEB;color:#A32D2D;font-size:10px;padding:2px 8px;border-radius:20px;border:.5px solid #F09595;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
/* Archived */
.sb-proj-item.archived{opacity:.55}
.archive-tag{font-size:9px;background:var(--bg3);color:var(--tx3);padding:1px 5px;border-radius:20px;margin-left:auto;flex-shrink:0}
/* Subprojects */
.sb-parent-item{display:flex;align-items:center;gap:8px;padding:6px 1rem 6px .75rem;font-size:13px;cursor:pointer;color:var(--tx2);transition:background .1s;position:relative}
.sb-parent-item:hover{background:var(--bg)}
.sb-parent-item.active{color:var(--tx);font-weight:500;background:var(--bg)}
.sb-sub-item{display:flex;align-items:center;gap:6px;padding:4px 1rem 4px 2rem;font-size:12px;cursor:pointer;color:var(--tx3);transition:background .1s;position:relative}
.sb-sub-item:hover{background:var(--bg);color:var(--tx2)}
.sb-sub-item.active{color:var(--tx);font-weight:500;background:var(--bg)}
.sb-sub-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-expand-btn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:11px;padding:1px 3px;display:flex;align-items:center;transition:transform .15s;flex-shrink:0}
.sb-actions-row{display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);gap:2px}
.sb-parent-item:hover .sb-actions-row,.sb-sub-item:hover .sb-actions-row{display:flex}
.sb-icon-btn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:12px;padding:2px 3px;border-radius:4px}
.sb-icon-btn:hover{color:var(--err)}
.sub-badge{font-size:9px;background:var(--accl);color:var(--acc);padding:1px 6px;border-radius:20px;margin-left:2px;font-weight:700}
/* Sidebar drag */
.sb-proj-row{transition:opacity .15s;position:relative}
.sb-proj-row.dragging{opacity:.35}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999}
.auth-box{background:var(--bg);border-radius:var(--rl);padding:2rem;max-width:440px;width:90%;border:.5px solid var(--bd2);text-align:center}
.auth-box h2{font-size:18px;font-weight:600;margin-bottom:.5rem}
.auth-box p{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:1.25rem}
.steps{text-align:left;background:var(--bg2);border-radius:var(--r);padding:1rem;margin-bottom:1.25rem;font-size:12px;line-height:2.2;color:var(--tx2)}
.steps b{color:var(--tx)}
/* Dependencies */
.dep-badge{font-size:9px;background:rgba(253,121,168,.15);color:#c0356e;border:1px solid rgba(253,121,168,.3);border-radius:20px;padding:1px 6px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.dep-blocked{border-left:3px solid var(--err)!important;opacity:.75}
.dep-blocker{border-left:3px solid var(--warn)!important}
/* Memory */
.memory-item{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:.5rem .75rem;font-size:11px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.memory-item i{color:var(--acc);font-size:13px;flex-shrink:0;margin-top:1px}
.memory-date{font-size:10px;color:var(--tx3);white-space:nowrap}
/* Notif */
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--err);position:absolute;top:2px;right:2px;border:1.5px solid var(--bg)}
.sync-ok{color:var(--ok)}.sync-err{color:var(--err)}
</head>
<body>

<div class="app">
  <!-- Mobile sidebar drawer overlay -->
  <div class="sb-drawer-overlay" id="sb-overlay" onclick="closeMobileSidebar()"></div>
  <aside class="sb">
    <div class="sb-logo">
      <div class="sb-logo-l"><i class="ti ti-layout-kanban"></i>Orbit</div>
      <button class="icon-btn" onclick="toggleTheme()" title="Thème clair/sombre"><i class="ti ti-moon" id="theme-icon"></i></button>
    <button class="icon-btn" onclick="openSearch()" title="Recherche globale"><i class="ti ti-search"></i></button>
    </div>
    <div>
      <div class="sb-lbl">Navigation</div>
      <div class="sb-item" id="nav-dash" onclick="setNav('dashboard')"><i class="ti ti-layout-dashboard"></i>Tableau de bord</div>
      <div class="sb-item" id="nav-cr" onclick="setNav('cr')"><i class="ti ti-notebook"></i>Comptes rendus</div>
      <div class="sb-item" id="nav-plan" onclick="setNav('planning')"><i class="ti ti-calendar-event"></i>Planning global</div>
      <div class="sb-item" id="nav-cal" onclick="setNav('calendar')"><i class="ti ti-calendar-month"></i>Calendrier</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div class="sb-lbl">Projets actifs</div>
      <div class="plist" id="plist"></div>
      <div class="add-proj" onclick="addProject()"><i class="ti ti-plus" style="font-size:13px"></i>Nouveau projet</div>
      <div class="add-proj" id="add-sub-btn" style="display:none;color:var(--acc)" onclick="addSubProject()"><i class="ti ti-folder-plus" style="font-size:13px"></i>Ajouter un sous-projet</div>
      <div class="sb-lbl" id="archive-lbl" style="cursor:pointer;display:flex;align-items:center;gap:4px" onclick="toggleArchive()">
        Archives <i class="ti ti-chevron-right" id="archive-chevron" style="font-size:11px"></i>
      </div>
      <div class="plist" id="archive-list" style="display:none"></div>
    </div>
    <div class="sb-foot">
      <div class="sb-item" onclick="generateWeeklyRecap()"><i class="ti ti-report-analytics"></i>Récap hebdo IA</div>
      <div class="sb-item" onclick="openNotifSettings()" style="position:relative"><i class="ti ti-bell"></i>Notifications<span class="notif-dot" id="notif-dot" style="display:none"></span></div>
      <div class="sb-item" onclick="openMemoryPanel()"><i class="ti ti-brain"></i>Mémoire IA</div>
      <div class="sb-item" onclick="manualSave()"><i class="ti ti-cloud-upload"></i>Sauvegarder Drive</div>
      <div class="sb-item"><i class="ti ti-settings"></i>Paramètres</div>
    </div>
  </aside>

  <div class="main">
    <div class="syncbar" id="syncbar">
      <i class="ti ti-cloud" id="sync-icon"></i>
      <span id="sync-msg">Initialisation...</span>
    </div>
    <div class="alert-banner" id="alert-banner" style="display:none"></div>
    <div id="main-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>
  </div>

  <div class="agent">
    <div class="agh">
      <div class="agav"><i class="ti ti-sparkles"></i></div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:500">Secrétaire IA</div>
        <div style="font-size:10px;color:var(--tx2)">
          <span style="width:5px;height:5px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:3px"></span>Disponible
        </div>
      </div>
      <button class="voice-btn" id="voice-btn" onclick="toggleVoice()" title="Commande vocale">
        <i class="ti ti-microphone" style="font-size:15px"></i>
      </button>
    </div>
    <div class="voice-status" id="voice-status">
      <i class="ti ti-microphone-off" style="font-size:12px"></i> Cliquer sur le micro pour parler
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="suggs" id="suggs"></div>

    <!-- Transcript upload zone -->
    <div id="transcript-zone" style="margin:.4rem .6rem;border:.5px dashed var(--bd2);border-radius:var(--r);padding:6px 8px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:6px"
      onclick="document.getElementById('transcript-input').click()"
      ondragover="event.preventDefault();this.style.background='var(--accl)'"
      ondragleave="this.style.background=''"
      ondrop="handleTranscriptDrop(event)">
      <i class="ti ti-file-upload" style="font-size:15px;color:var(--tx3)"></i>
      <span style="font-size:11px;color:var(--tx3);flex:1">Déposer un transcript (.txt, .pdf, .docx)</span>
      <span id="transcript-name" style="font-size:10px;color:var(--acc);display:none"></span>
    </div>
    <input type="file" id="transcript-input" accept=".txt,.pdf,.md,.docx,.doc" style="display:none" onchange="handleTranscriptFile(this.files[0])"/>

    <div class="chatia">
      <input type="text" id="chat-in" placeholder="Ou écrivez ici..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="sbtn" onclick="sendMsg()"><i class="ti ti-send" style="font-size:13px"></i></button>
    </div>
  </div>
</div>

<!-- Task detail panel -->
<div class="task-panel-overlay" id="task-panel-overlay" style="display:none" onclick="if(event.target===this)closeTaskPanel()">
  <div class="task-panel" id="task-panel"></div>
</div>

<!-- Quick Notes -->
<div class="qnotes-panel" id="qnotes-panel">
  <div class="qnotes-hd" onclick="toggleNotes()">
    <i class="ti ti-pencil" style="font-size:14px;color:var(--acc)"></i>
    <span>Notes rapides</span>
    <i class="ti ti-chevron-down" id="qnotes-chevron" style="font-size:13px;color:var(--tx3)"></i>
  </div>
  <div class="qnotes-body">
    <div class="qnotes-list" id="qnotes-list"></div>
    <div class="qnotes-add">
      <input type="text" id="qnotes-input" placeholder="Nouvelle note..." onkeydown="if(event.key==='Enter')addQuickNote()"/>
      <button class="btn pri" style="padding:4px 8px;font-size:11px" onclick="addQuickNote()"><i class="ti ti-plus" style="font-size:11px"></i></button>
    </div>
  </div>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay" style="display:none" onclick="if(event.target===this)closeSearch()">
  <div class="search-box">
    <div class="search-input-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search-input" placeholder="Rechercher une tâche, un CR, une action..." oninput="runSearch(this.value)" onkeydown="if(event.key==='Escape')closeSearch()"/>
      <button class="icon-btn" onclick="closeSearch()"><i class="ti ti-x"></i></button>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty">Tapez pour rechercher dans tous vos projets</div>
    </div>
  </div>
</div>

<!-- Templates modal -->
<div class="modal-overlay" id="tpl-modal" style="display:none" onclick="if(event.target===this)closeTplModal()">
  <div class="modal-box">
    <div class="modal-hd">
      <h2><i class="ti ti-template" style="margin-right:6px;color:var(--acc)"></i>Choisir un template</h2>
      <button class="icon-btn" onclick="closeTplModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="tpl-list"></div>
  </div>
</div>

<!-- Status editor modal -->
<div class="modal-overlay" id="status-modal" style="display:none" onclick="if(event.target===this)closeStatusModal()">
  <div class="modal-box">
    <div class="modal-hd">
      <h2><i class="ti ti-tag" style="margin-right:6px;color:var(--acc)"></i>Statut du projet</h2>
      <button class="icon-btn" onclick="closeStatusModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="status-list"></div>
  </div>
</div>

<!-- Notification settings modal -->
<div class="modal-overlay" id="notif-modal" style="display:none" onclick="if(event.target===this)document.getElementById('notif-modal').style.display='none'">
  <div class="modal-box">
    <div class="modal-hd">
      <h2><i class="ti ti-bell" style="margin-right:6px;color:var(--acc)"></i>Rappels & Notifications</h2>
      <button class="icon-btn" onclick="document.getElementById('notif-modal').style.display='none'"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="notif-body"></div>
  </div>
</div>

<!-- Memory panel modal -->
<div class="modal-overlay" id="memory-modal" style="display:none" onclick="if(event.target===this)document.getElementById('memory-modal').style.display='none'">
  <div class="modal-box" style="width:560px">
    <div class="modal-hd">
      <h2><i class="ti ti-brain" style="margin-right:6px;color:var(--acc)"></i>Mémoire IA</h2>
      <div style="display:flex;gap:6px">
        <button class="btn pri" style="font-size:11px;padding:4px 9px" onclick="extractMemory()"><i class="ti ti-refresh" style="font-size:11px"></i>Mettre à jour</button>
        <button class="icon-btn" onclick="document.getElementById('memory-modal').style.display='none'"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div class="modal-body" id="memory-body"></div>
  </div>
</div>

<!-- Auth overlay -->
<div class="overlay" id="auth-overlay" style="display:none">
  <div class="auth-box">
    <i class="ti ti-brand-google-drive" style="font-size:44px;color:var(--acc);display:block;margin-bottom:.75rem"></i>
    <h2>Connexion Google Drive</h2>
    <p>Orbit sauvegarde vos données dans un fichier <code>orbit-data.json</code> sur votre Drive, synchronisé automatiquement.</p>
    <div class="steps">
      <b>1.</b> Cliquez sur "Connecter Google Drive"<br>
      <b>2.</b> Autorisez l'accès dans la fenêtre Google<br>
      <b>3.</b> Vos données se synchronisent automatiquement
    </div>
    <button class="btn pri" style="width:100%;justify-content:center;font-size:13px;padding:9px" onclick="startGoogleAuth()">
      <i class="ti ti-brand-google"></i>Connecter Google Drive
    </button>
    <button class="btn" style="width:100%;justify-content:center;margin-top:8px;font-size:12px" onclick="startLocalMode()">
      Continuer sans sauvegarde cloud
    </button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIGURATION — À remplir avec vos identifiants Google OAuth
// Pour créer un Client ID : console.cloud.google.com
// Activez l'API Google Drive, créez des identifiants OAuth 2.0
// Ajoutez l'URL de ce fichier comme "URI de redirection autorisée"
// ══════════════════════════════════════════════════════════════

const DRIVE_FILE_ID    = '1-FIKosId_JKWAic5HrgmsEYwD1BtLtPD'; // orbit-data.json déjà créé
const SCOPES = 'https://www.googleapis.com/auth/drive';
// Proxy CORS via Cloudflare Worker
const ANTHROPIC_URL = 'https://wispy-union-5fff.sylvain-pouteau.workers.dev/';

// ─── CONSTANTES ───────────────────────────────────────────────
const COLORS = ['#534AB7','#0F6E56','#993C1D','#185FA5','#854F0B','#993556'];

// ─── GOOGLE AUTH ──────────────────────────────────────────────
function startGoogleAuth(){
  const redirect = location.href.split('?')[0].split('#')[0];
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${GOOGLE_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=${encodeURIComponent(SCOPES)}&prompt=consent`;
  window.location.href = url;
}

function startLocalMode(){
  localMode=true;
  document.getElementById('auth-overlay').style.display='none';
  projects = loadLocalData();
  setSyncStatus('local','Mode local — données non sauvegardées sur le cloud');
  boot();
}

function checkOAuthCallback(){
  if(!location.hash.includes('access_token')) return false;
  const p = new URLSearchParams(location.hash.replace('#',''));
  accessToken = p.get('access_token');
  history.replaceState(null,'',location.pathname);
  if(accessToken){ loadFromDrive(); return true; }
  return false;
}

// ─── DRIVE I/O ────────────────────────────────────────────────
async function loadFromDrive(){
  setSyncStatus('loading','Chargement depuis Google Drive...');
  try{
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${DRIVE_FILE_ID}?alt=media`,
      {headers:{Authorization:`Bearer ${accessToken}`}});
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    projects = data.projects || loadLocalData();
    setSyncStatus('ok','Synchronisé avec Google Drive');
    boot();
  }catch(e){
    setSyncStatus('err','Erreur Drive — mode local activé');
    projects = loadLocalData(); localMode=true; boot();
  }
}

async function saveToDrive(){
  localStorage.setItem('orbit-local',JSON.stringify({projects}));
  if(localMode){ setSyncStatus('local','Sauvegardé localement · '+hms()); return; }
  if(!accessToken){ setSyncStatus('err','Token expiré — reconnectez-vous'); return; }
  setSyncStatus('loading','Sauvegarde sur Google Drive...');
  try{
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${DRIVE_FILE_ID}?uploadType=media`,{
      method:'PATCH',
      headers:{Authorization:`Bearer ${accessToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({version:1,lastSaved:new Date().toISOString(),projects})
    });
    setSyncStatus('ok','Sauvegardé sur Drive · '+hms());
  }catch(e){ setSyncStatus('err','Erreur Drive — copie locale conservée'); }
}

function scheduleAutoSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveToDrive,1800); }
function manualSave(){ saveToDrive(); }
function hms(){ return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

function setSyncStatus(state,msg){
  const icon=document.getElementById('sync-icon'), txt=document.getElementById('sync-msg');
  txt.textContent=msg;
  const map={loading:['ti ti-refresh spin','var(--tx3)'],ok:['ti ti-cloud-check','var(--ok)'],local:['ti ti-device-laptop','var(--tx3)'],err:['ti ti-cloud-off','var(--err)']};
  const [cls,col]=map[state]||map.local;
  icon.className=cls; icon.style.color=col;
}

// ─── LOCAL DATA ───────────────────────────────────────────────
function loadLocalData(){
  try{ const s=localStorage.getItem('orbit-local'); if(s) return JSON.parse(s).projects||defaultProjects(); }catch(e){}
  return defaultProjects();
}
function defaultProjects(){
  return [];
}

// ─── INIT ─────────────────────────────────────────────────────
function init(){
  if(checkOAuthCallback()) return;
  // Always pre-load from localStorage first so the app never stays stuck
  projects = loadLocalData();
  // If a real Google Client ID is set, show the auth overlay
  if(GOOGLE_CLIENT_ID !== 'VOTRE_CLIENT_ID.apps.googleusercontent.com'){
    document.getElementById('auth-overlay').style.display='flex'; return;
  }
  // Local mode (no client ID configured yet)
  localMode = true;
  setSyncStatus('local','Données sauvegardées localement dans votre navigateur');
  boot();
}

function boot(){
  renderSidebar(); selectProject(0);
  renderAlertBanner();
  renderQuickNotes();
  initNotifications();
  updateNotifDot();
  // Apply theme of first project
  if(projects.length) applyProjectTheme(projects[0].color);
  addAgentMsg(`Bonjour ! Orbit est prêt avec <strong>${projects.length} projets</strong>. Données ${localMode?'sauvegardées localement':'synchronisées avec Google Drive'}.`,'ag');
  if(aiMemory.length) addAgentMsg(`<i class="ti ti-brain" style="color:var(--acc)"></i> <strong>${aiMemory.length} souvenir${aiMemory.length>1?'s':''}</strong> en mémoire.`,'ag');
  updateSuggs();
  installPWA();
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function lightenColor(hex, factor=0.85){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lr=Math.round(r+(255-r)*factor),lg=Math.round(g+(255-g)*factor),lb=Math.round(b+(255-b)*factor);
  return `#${lr.toString(16).padStart(2,'0')}${lg.toString(16).padStart(2,'0')}${lb.toString(16).padStart(2,'0')}`;
}

function darkenColor(hex, factor=0.75){
  const r=Math.round(parseInt(hex.slice(1,3),16)*factor);
  const g=Math.round(parseInt(hex.slice(3,5),16)*factor);
  const b=Math.round(parseInt(hex.slice(5,7),16)*factor);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function applyProjectTheme(color){
  if(!color) color='#6C5CE7';
  const root=document.documentElement;
  const rgb=hexToRgb(color);
  const light=lightenColor(color, 0.88);
  const dark=darkenColor(color, 0.8);
  root.style.setProperty('--acc', color);
  root.style.setProperty('--accl', light);
  root.style.setProperty('--accd', dark);
  root.style.setProperty('--grad', `linear-gradient(135deg,${color},${lightenColor(color,0.3)})`);
  root.style.setProperty('--shadow', `0 4px 24px rgba(${rgb},.15)`);
  root.style.setProperty('--shadow-sm', `0 2px 8px rgba(${rgb},.08)`);
  // Update meta theme-color for iOS
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', color);
}

function resetTheme(){
  const root=document.documentElement;
  root.style.setProperty('--acc','#6C5CE7');
  root.style.setProperty('--accl','#EEF0FF');
  root.style.setProperty('--accd','#4834d4');
  root.style.setProperty('--grad','linear-gradient(135deg,#6C5CE7,#a29bfe)');
  root.style.setProperty('--shadow','0 4px 24px rgba(108,92,231,.12)');
  root.style.setProperty('--shadow-sm','0 2px 8px rgba(108,92,231,.08)');
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content','#6C5CE7');
}

  if(!confirm(`Supprimer le projet "${projects[i].name}" et toutes ses données ?`)) return;

    activeP=Math.min(i,projects.length-1);

function assignExistingAsSubproject(parentPi){
  const parent=projects[parentPi];
  const candidates=projects.filter((p,i)=>i!==parentPi&&!p.parentId&&!p.archived&&p.id!==parent.id);
  if(!candidates.length){ alert('Aucun projet indépendant disponible à assigner.'); return; }
  const opts=candidates.map((p,i)=>`${i} → ${p.name}`).join('\n');
  const choice=prompt(`Quel projet assigner comme sous-projet de "${parent.name}" ?\n\n${opts}\n\nEntrez le numéro :`);
  if(choice===null||choice.trim()==='') return;
  const idx=parseInt(choice);
  if(isNaN(idx)||!candidates[idx]) return;
  candidates[idx].parentId=parent.id;
  scheduleAutoSave(); renderSidebar(); renderVC();
  addAgentMsg(`<strong>${candidates[idx].name}</strong> est maintenant un sous-projet de <strong>${parent.name}</strong>.`,'ag');
}

function updateTask(ci,idx,field,value){
  projects[activeP].columns[ci].cards[idx][field]=value;
  scheduleAutoSave();
  if(field==='title'||field==='priority'||field==='tag') renderVC();
}

function moveTaskToCol(fromCi,idx,toCi){
  if(fromCi===toCi) return;
  const card=projects[activeP].columns[fromCi].cards.splice(idx,1)[0];
  projects[activeP].columns[toCi].cards.push(card);
  scheduleAutoSave(); renderVC();
  // Reopen panel in new column
  const newIdx=projects[activeP].columns[toCi].cards.length-1;
  taskPanelCtx={ci:toCi,idx:newIdx};
  renderTaskPanel();
}

function addComment(ci,idx){
  const inp=document.getElementById('tp-comment-input'); if(!inp||!inp.value.trim()) return;
  projects[activeP].columns[ci].cards[idx].comments=projects[activeP].columns[ci].cards[idx].comments||[];
  projects[activeP].columns[ci].cards[idx].comments.push({text:inp.value.trim(),authorIdx:0,date:new Date().toISOString()});
  inp.value=''; scheduleAutoSave(); renderTaskPanel(); renderVC();
}

function deleteComment(ci,idx,cmi){
  projects[activeP].columns[ci].cards[idx].comments.splice(cmi,1);
  scheduleAutoSave(); renderTaskPanel(); renderVC();
}

function deleteTask(ci,idx){
  if(!confirm('Supprimer cette tâche ?')) return;
  projects[activeP].columns[ci].cards.splice(idx,1);
  scheduleAutoSave();
  if(taskPanelCtx) closeTaskPanel();
  renderVC();
}

function addDependency(ci,idx,val){
  if(!val) return;
  const c=projects[activeP].columns[ci].cards[idx];
  c.deps=c.deps||[];
  if(!c.deps.includes(val)) c.deps.push(val);
  scheduleAutoSave(); renderTaskPanel(); renderVC();
}

function removeDependency(ci,idx,val){
  const c=projects[activeP].columns[ci].cards[idx];
  if(!c.deps) return;
  c.deps=c.deps.filter(d=>d!==val);
  scheduleAutoSave(); renderTaskPanel(); renderVC();
}

function renderDepsPanel(ci,idx){
  const c=projects[activeP].columns[ci].cards[idx];
  const el=document.getElementById('tp-deps'); if(!el) return;
  const deps=c.deps||[];
  if(!deps.length){ el.innerHTML=`<span style="font-size:11px;color:var(--tx3)">Aucune dépendance</span>`; return; }
  el.innerHTML=deps.map(d=>{
    const [dci,didx]=d.split('-').map(Number);
    const dep=projects[activeP].columns[dci]?.cards[didx];
    if(!dep) return'';
    const done=projects[activeP].columns[dci].title==='Terminé'||dep.status==='done';
    return`<span class="dep-badge" style="${done?'opacity:.5':''}">
      <i class="ti ti-${done?'check':'lock'}" style="font-size:9px"></i>${dep.title.slice(0,20)}${dep.title.length>20?'...':''}
      <button onclick="removeDependency(${ci},${idx},'${d}')" style="background:none;border:none;cursor:pointer;color:inherit;padding:0;font-size:10px;margin-left:2px">×</button>
    </span>`;
  }).join('');
}

// ─── PLANNING ─────────────────────────────────────────────────
function renderProjectPlanning(el){
  const p=projects[activeP];
  const all=p.reports.flatMap((r,ri)=>(r.actions||[]).map(a=>({...a,crTitle:r.title,ri})));
  if(!all.length){ el.innerHTML=`<div class="empty"><i class="ti ti-calendar-event"></i><p>Aucune action planifiée<br>dans ce projet</p></div>`; return; }
  all.sort((a,b)=>a.deadline.localeCompare(b.deadline));
  const minD=new Date(all[0].deadline),maxD=new Date(all[all.length-1].deadline);
  const span=Math.max(1,(maxD-minD)/86400000)+2;
  const startD=new Date(minD); startD.setDate(startD.getDate()-1);
  const overdue=all.filter(a=>a.status!=='done'&&daysUntil(a.deadline)<0);
  const urgent=all.filter(a=>a.status!=='done'&&daysUntil(a.deadline)>=0&&daysUntil(a.deadline)<=3);
  const gantt=all.map(a=>{
    const ss=ST_S[a.status]||ST_S.todo,ds=dlStyle(a.deadline);
    const left=Math.max(0,Math.min(93,(Math.round((new Date(a.deadline)-startD)/86400000)/(span+2))*100));
    return`<div class="gantt-row">
      <div class="glabel" title="${a.title}">${a.status!=='done'&&daysUntil(a.deadline)<0?`<span class="odot"></span>`:''}<span>${a.title}</span></div>
      <div class="gtrack"><div class="gbar" style="left:${left}%;width:clamp(30px,8%,100px);background:${a.status==='done'?'var(--ok)':a.status==='blocked'?'var(--err)':p.color}"><span class="gbarlbl">${fmt(a.deadline)}</span></div></div>
      <span class="dbadge" style="background:${ds.bg};color:${ds.tc};min-width:65px;text-align:center;flex-shrink:0;font-size:10px">${ds.label}</span>
      <span class="spill" style="background:${ss.bg};color:${ss.tc};flex-shrink:0">${ss.label}</span>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="planpage">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:500">Planning — ${p.name}</span>
      <span style="font-size:11px;color:var(--tx2)">${all.length} action${all.length>1?'s':''} · <span style="color:var(--err)">${overdue.length} en retard</span></span>
    </div>
    <div class="sbox" style="padding:.75rem">${gantt}</div>
    ${[...overdue,...urgent].length?`<div class="sbox">
      <div class="stitle"><i class="ti ti-alert-circle" style="color:var(--err)"></i>Urgences</div>
      ${[...overdue,...urgent].map(a=>{const ds=dlStyle(a.deadline);return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--bd)">
        <span style="flex:1;font-size:12px">${a.title}</span>
        <span style="font-size:11px;color:var(--tx2)">${a.assignee}</span>
        <span class="dbadge" style="background:${ds.bg};color:${ds.tc}">${ds.label}</span>
      </div>`;}).join('')}
    </div>`:''}
  </div>`;
}

function renderGlobalPlanning(){
  document.getElementById('main-content').innerHTML=`<div class="topbar"><h1>Planning global</h1></div><div class="vc" id="vc"></div>`;

// ─── CALENDAR ─────────────────────────────────────────────────
function renderCalendar(){
  document.getElementById('main-content').innerHTML=`
    <div class="topbar">
      <h1>Calendrier</h1>
      <div class="cal-nav">
        <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()"><i class="ti ti-chevron-left"></i></button>
        <span style="font-size:13px;font-weight:500;min-width:130px;text-align:center" id="cal-title"></span>
        <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()"><i class="ti ti-chevron-right"></i></button>
        <button onclick="calMonth=new Date().getMonth();calYear=new Date().getFullYear();renderCalendar()" style="font-size:11px">Aujourd'hui</button>
      </div>
    </div>
    <div class="vc" id="vc"></div>`;

  const el=document.getElementById('vc');
  const title=new Date(calYear,calMonth,1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  document.getElementById('cal-title').textContent=title.charAt(0).toUpperCase()+title.slice(1);

  // Build events map from all actions
  const events={};
  projects.forEach((p,pi)=>{
    p.reports.forEach((r,ri)=>{
      (r.actions||[]).forEach((a,ai)=>{
        if(!events[a.deadline]) events[a.deadline]=[];
        events[a.deadline].push({...a,projColor:p.color,projName:p.name});
      });
    });
  });

  const today=new Date();
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  // Start from Monday
  let startDow=firstDay.getDay(); if(startDow===0) startDow=7;
  const days=[];
  // Previous month days
  for(let i=startDow-1;i>0;i--){
    const d=new Date(calYear,calMonth,1-i);
    days.push({date:d,current:false});
  }
  // Current month
  for(let i=1;i<=lastDay.getDate();i++){
    days.push({date:new Date(calYear,calMonth,i),current:true});
  }
  // Next month
  while(days.length%7!==0) days.push({date:new Date(calYear,calMonth+1,days.length-lastDay.getDate()-startDow+2),current:false});

  const dayNames=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const header=dayNames.map(d=>`<div class="cal-dname">${d}</div>`).join('');
  const cells=days.map(({date,current})=>{
    const key=date.toISOString().split('T')[0];
    const evs=events[key]||[];
    const isToday=date.toDateString()===today.toDateString();
    const evHtml=evs.slice(0,3).map(e=>`<div class="cal-event" style="background:${e.status==='done'?'#1D9E75':e.projColor}" title="${e.title} — ${e.projName}">${e.title}</div>`).join('');
    const more=evs.length>3?`<div style="font-size:9px;color:var(--tx3)">${evs.length-3} de plus</div>`:'';
    return`<div class="cal-day${isToday?' today':''}${!current?' other-month':''}">
      <div class="cal-day-num">${date.getDate()}</div>
      ${evHtml}${more}
    </div>`;
  }).join('');

  el.innerHTML=`<div class="cal-wrap">
    <div class="cal-head">${header}</div>
    <div class="cal-grid">${cells}</div>
    ${Object.keys(events).length===0?`<div class="sbox"><div style="font-size:12px;color:var(--tx3);text-align:center;padding:.5rem">Aucune action avec deadline — ajoutez des actions dans vos comptes rendus</div></div>`:''}
  </div>`;
}
function newProject(parentId=null){
  const label=parentId!==null?'Nom du sous-projet :':'Nom du nouveau projet :';
  const n=prompt(label); if(!n) return;
  const color=parentId!==null?(projects.find(p=>p.id===parentId)?.color||COLORS[projects.length%COLORS.length]):COLORS[projects.length%COLORS.length];
  const id=Date.now();
  projects.push({id,name:n,color:parentId!==null?color+'99':color,status:'Planifié',parentId,
    columns:[{title:'Backlog',cards:[]},{title:'À faire',cards:[]},{title:'En cours',cards:[]},{title:'Terminé',cards:[]}],
    reports:[],contacts:[],context:'',expanded:true});
  // Expand parent
  if(parentId!==null){const par=projects.find(p=>p.id===parentId);if(par)par.expanded=true;}
  renderSidebar(); selectProject(projects.length-1); scheduleAutoSave();
}
function addProject(){ newProject(null); }

function assignToParent(pi){
  const roots=projects.filter((p,i)=>!p.parentId&&i!==pi&&!p.archived);
  if(!roots.length){ alert('Aucun projet parent disponible.'); return; }
  const opts=roots.map((p,i)=>`${i} → ${p.name}`).join('\n');
  const choice=prompt(`Assigner "${projects[pi].name}" à quel projet parent ?\n\n${opts}\n\n(Entrez le numéro, ou laissez vide pour retirer du parent)`);
  if(choice===null) return;
  if(choice.trim()===''){
    projects[pi].parentId=null;
  } else {
    const idx=parseInt(choice);
    if(isNaN(idx)||!roots[idx]) return;
    projects[pi].parentId=roots[idx].id;
    roots[idx].expanded=true;
  }
  renderSidebar(); scheduleAutoSave();
  if(navMode==='project'&&activeP===pi) renderProjectMain();
}

// Sidebar drag & drop reordering
let sbDragPi=null, sbDragEl=null;
function sbDragStart(e,pi){
  sbDragPi=pi;
  sbDragEl=e.currentTarget.closest('.sb-proj-row');
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>sbDragEl?.classList.add('dragging'),0);
}
function sbDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const row=e.currentTarget.closest('.sb-proj-row');
  if(row&&row!==sbDragEl) row.style.borderTop='2px solid var(--acc)';
}
function sbDrop(e,targetPi){
  e.preventDefault();
  document.querySelectorAll('.sb-proj-row').forEach(r=>r.style.borderTop='');
  if(sbDragPi===null||sbDragPi===targetPi) return;
  // Reorder projects array (only roots)
  const dragged=projects[sbDragPi];
  const target=projects[targetPi];
  const roots=projects.filter(p=>!p.parentId&&!p.archived);
  const draggedIdx=roots.indexOf(dragged);
  const targetIdx=roots.indexOf(target);
  if(draggedIdx<0||targetIdx<0) return;
  // Rebuild projects order: roots reordered + subs kept after their parent
  const subs=projects.filter(p=>p.parentId);
  roots.splice(draggedIdx,1);
  roots.splice(targetIdx,0,dragged);
  projects.length=0;
  roots.forEach(r=>{ projects.push(r); subs.filter(s=>s.parentId===r.id).forEach(s=>projects.push(s)); });
  // Fix activeP index
  activeP=projects.indexOf(projects.find((_,i)=>i===activeP)||projects[0]);
  sbDragPi=null; scheduleAutoSave(); renderSidebar();
}

  document.querySelectorAll('.sb-proj-row').forEach(r=>r.style.borderTop='');
  sbDragEl?.classList.remove('dragging');

function addAgentMsg(html,role){ const d=document.createElement('div'); d.className='msg '+role; d.innerHTML=html; document.getElementById('msgs').appendChild(d); document.getElementById('msgs').scrollTop=99999; return d; }
const SUGGS=['Quelles actions sont en retard ?','Génère un CR avec actions','Analyse tous mes projets','Quels sont mes projets en difficulté ?'];
function updateSuggs(){ document.getElementById('suggs').innerHTML=SUGGS.map(s=>`<button class="sugg" onclick="sendText('${s.replace(/'/g,"\\'")}')">↗ ${s}</button>`).join(''); }

function getCtx(userMsg=''){
  if(!projects.length) return 'Aucun projet créé.';
  const p=projects[activeP];
  p.contacts=p.contacts||[];

  // Contexte minimal toujours présent
  let ctx=`Projet actif : ${p.name} (${p.status})\n`;

  // Contexte du projet — lu depuis le tableau de bord
  if(p.context&&p.context.trim()){
    ctx+=`Description du projet : ${p.context.trim()}\n`;
  }

  // Si c'est un sous-projet, ajouter le contexte du projet parent
  if(p.parentId){
    const parent=projects.find(x=>x.id===p.parentId);
    if(parent){
      ctx+=`Projet parent : ${parent.name}`;
      if(parent.context) ctx+=` — ${parent.context.slice(0,100)}`;
      ctx+=`\n`;
      const siblings=projects.filter(s=>s.parentId===p.parentId&&s.id!==p.id);
      if(siblings.length) ctx+=`Autres sous-projets : ${siblings.map(s=>s.name).join(', ')}\n`;
    }
  }

  // Si c'est un projet parent, mentionner les sous-projets
  const subs=projects.filter(s=>s.parentId===p.id);
  if(subs.length){
    ctx+=`Sous-projets : ${subs.map(s=>{
      const t=s.columns.flatMap(c=>c.cards).length;
      const d=s.columns[3]?.cards.length||0;
      return `${s.name}(${d}/${t} tâches)`;
    }).join(', ')}\n`;
  }

  ctx+=`Tâches : ${p.columns.flatMap(c=>c.cards.map(x=>x.title)).join(', ')||'aucune'}\n`;
  ctx+=`Actions : ${p.reports.flatMap(r=>(r.actions||[]).map(a=>`${a.title}(${a.status}${a.deadline?',dl:'+a.deadline:''})`)).join('; ')||'aucune'}\n`;
  ctx+=`Date : ${new Date().toLocaleDateString('fr-FR')}\n`;
  // Inject AI memory
  ctx+=getMemoryContext();

  // Contacts — toujours inclus
  if(p.contacts.length){
    ctx+=`Contacts du projet :\n`;
    p.contacts.forEach(c=>{
      ctx+=`  • ${c.name}${c.role?' ('+c.role+')':''}${c.email?' <'+c.email+'>':''}${c.notes?' — '+c.notes:''}\n`;
    });
  }

  // Contexte global — seulement si question multi-projets
  const isGlobal=/autre projet|tous les projets|compare|global|ensemble|général/i.test(userMsg);
  if(isGlobal){
    const others=projects.filter((_,i)=>i!==activeP&&!projects[i]?.archived);
    if(others.length){
      ctx+=`\nAutres projets :\n`;
      others.forEach(p2=>{
        const total=p2.columns.flatMap(c=>c.cards).length;
        const done=p2.columns[3]?.cards.length||0;
        const overdue=p2.reports.flatMap(r=>r.actions||[]).filter(a=>a.status!=='done'&&daysUntil(a.deadline)<0).length;
        ctx+=`  • ${p2.name} (${p2.status})${p2.context?' — '+p2.context.slice(0,80):''}`;
        ctx+=` — ${total} tâches, ${done} terminées${overdue?`, ${overdue} en retard`:''}`;
        if((p2.contacts||[]).length) ctx+=`, contacts: ${p2.contacts.map(c=>c.name).join(', ')}`;
        ctx+=`\n`;
      });
    }
  }

  return ctx;
}

async function callClaude(userMsg){
  const t=addAgentMsg('...','typ');
  try{
    const ctx=getCtx(userMsg);
    const res=await fetch(ANTHROPIC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-opus-4-7',max_tokens:1200,
      system:`Tu es la secrétaire IA de l'app Orbit.

${ctx}

Capacités (réponds avec un JSON si action à faire) :
1. CRÉER TÂCHE → {"action":"create_task","title":"...","col":0-3,"tag":"Design|Dev|SEO|Contenu|Test","priority":"high|medium|low"}
   col: 0=Backlog, 1=À faire, 2=En cours, 3=Terminé
2. CRÉER CR → {"action":"create_report","title":"...","risks":"...","comments":"...","actions":[{"title":"...","assignee":"AL","deadline":"YYYY-MM-DD","status":"todo"}]}
3. RÉDIGER UN EMAIL → utilise les contacts du projet pour remplir le destinataire. Réponds en texte avec l'email formaté.
4. CONSEIL/ANALYSE → texte direct, actionnable, max 5 phrases.

Règles : réponds en français. Pour les emails, utilise les vraies coordonnées des contacts. Sois précis.`,
      messages:[{role:'user',content:userMsg}]})});
    const data=await res.json(); t.remove();
    const raw=data.content?.map(b=>b.text||'').join('')||'Erreur.';
    const jm=raw.match(/\{[\s\S]*?"action"[\s\S]*?\}/);
    if(jm){
      try{
        const parsed=JSON.parse(jm[0]);
        if(parsed.action==='create_task'){
          projects[activeP].columns[Math.min(3,Math.max(0,parsed.col||1))].cards.push({title:parsed.title,tag:parsed.tag||'Dev',priority:parsed.priority||'medium',members:[0],desc:'',comments:[]});
          if(activeV==='kanban') renderVC();
          addAgentMsg(`Tâche <strong>${parsed.title}</strong> ajoutée dans ${projects[activeP].columns[Math.min(3,Math.max(0,parsed.col||1))].title}.`,'ag');
          scheduleAutoSave();
        } else if(parsed.action==='create_report'){
          projects[activeP].reports.unshift({id:Date.now(),title:parsed.title,date:new Date().toISOString().split('T')[0],risks:parsed.risks||'',comments:parsed.comments||'',actions:parsed.actions||[],links:[]});
          addAgentMsg(`CR <strong>${parsed.title}</strong> créé avec ${(parsed.actions||[]).length} action(s).`,'ag');
          if(activeV==='cr'||activeV==='planning') renderVC();
          scheduleAutoSave();
        }
      }catch(e){ addAgentMsg(raw,'ag'); }
    } else { addAgentMsg(raw,'ag'); }
    updateSuggs();
  }catch(e){ t.remove(); addAgentMsg('Erreur API.','ag'); }
}

function openSearch(){ document.getElementById('search-overlay').style.display='flex'; setTimeout(()=>document.getElementById('search-input').focus(),50); }
function closeSearch(){ document.getElementById('search-overlay').style.display='none'; document.getElementById('search-input').value=''; document.getElementById('search-results').innerHTML='<div class="search-empty">Tapez pour rechercher dans tous vos projets</div>'; }

function runSearch(q){
  const el=document.getElementById('search-results');
  if(!q.trim()){ el.innerHTML='<div class="search-empty">Tapez pour rechercher dans tous vos projets</div>'; return; }
  const ql=q.toLowerCase();
  const results=[];
  projects.forEach((p,pi)=>{
    p.columns.forEach(col=>col.cards.forEach(c=>{ if(c.title.toLowerCase().includes(ql)) results.push({type:'task',icon:'ti-square-check',title:c.title,sub:p.name+' · '+col.title,pi,action:`selectProject(${pi});sv('kanban')`}); }));
    p.reports.forEach((r,ri)=>{
      if(r.title.toLowerCase().includes(ql)||(r.comments||'').toLowerCase().includes(ql)||(r.risks||'').toLowerCase().includes(ql))
        results.push({type:'cr',icon:'ti-notebook',title:r.title,sub:p.name+' · '+fmtFull(r.date),pi,action:`openCREditor(${pi},${ri})`});
      (r.actions||[]).forEach(a=>{ if(a.title.toLowerCase().includes(ql)) results.push({type:'action',icon:'ti-checkbox',title:a.title,sub:p.name+' · deadline : '+fmt(a.deadline),pi,action:`selectProject(${pi});sv('planning')`}); });
    });
  });

  if(!results.length){ el.innerHTML='<div class="search-empty">Aucun résultat pour "'+q+'"</div>'; return; }
  const groups={task:'Tâches',cr:'Comptes rendus',action:'Actions'};
  let html='';
  Object.entries(groups).forEach(([type,label])=>{
    const gr=results.filter(r=>r.type===type);
    if(!gr.length) return;
    html+=`<div class="search-group">${label}</div>`;
    html+=gr.slice(0,5).map(r=>`<div class="search-result" onclick="${r.action};closeSearch()">
      <i class="ti ${r.icon}"></i>
      <div class="search-result-main"><div class="search-result-title">${r.title}</div><div class="search-result-sub">${r.sub}</div></div>
    </div>`).join('');
  });
  el.innerHTML=html;
}

// ─── VOICE ASSISTANT ──────────────────────────────────────────
let recognition=null, synth=window.speechSynthesis, isListening=false, voiceEnabled=false;
let voiceLang='fr-FR';

function initVoice(){
  const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec){ setVoiceStatus('⚠️ Votre navigateur ne supporte pas la voix (Chrome requis)',''); return false; }
  recognition=new SpeechRec();
  recognition.lang=voiceLang;
  recognition.continuous=false;
  recognition.interimResults=false;
  recognition.onstart=()=>{ isListening=true; setVoiceStatus('','listening'); document.getElementById('voice-btn').classList.add('listening'); document.getElementById('voice-btn').innerHTML='<i class="ti ti-microphone" style="font-size:15px"></i>'; };
  recognition.onresult=e=>{ const transcript=e.results[0][0].transcript; handleVoiceCommand(transcript); };
  recognition.onerror=e=>{ stopListening(); setVoiceStatus('Erreur micro : '+e.error,''); };
  recognition.onend=()=>{ stopListening(); };
  return true;
}

function toggleVoice(){
  if(!recognition && !initVoice()) return;
  if(isListening){ stopListening(); return; }
  startListening();
}

function startListening(){
  if(!recognition) initVoice();
  try{ recognition.start(); }catch(e){}
}

function stopListening(){
  isListening=false;
  const btn=document.getElementById('voice-btn');
  if(btn){ btn.classList.remove('listening'); btn.classList.remove('speaking'); btn.innerHTML='<i class="ti ti-microphone" style="font-size:15px"></i>'; }
  setVoiceStatus('<i class="ti ti-microphone-off" style="font-size:12px"></i> Cliquer sur le micro pour parler','');
  try{ recognition.stop(); }catch(e){}
}

function setVoiceStatus(html, state){
  const el=document.getElementById('voice-status'); if(!el) return;
  if(state==='listening'){
    el.className='voice-status listening';
    el.innerHTML=`<div class="voice-wave"><span></span><span></span><span></span><span></span></div> J'écoute...`;
  } else if(state==='speaking'){
    el.className='voice-status active';
    el.innerHTML=`<i class="ti ti-volume" style="font-size:12px"></i> ${html}`;
  } else {
    el.className='voice-status';
    el.innerHTML=html;
  }
}

function speak(text){
  if(!synth) return;
  synth.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang=voiceLang; utt.rate=1.05; utt.pitch=1;
  // Prefer a French female voice
  const voices=synth.getVoices();
  const frVoice=voices.find(v=>v.lang.startsWith('fr')&&v.name.toLowerCase().includes('female'))
    ||voices.find(v=>v.lang.startsWith('fr'))
    ||voices[0];
  if(frVoice) utt.voice=frVoice;
  const btn=document.getElementById('voice-btn');
  utt.onstart=()=>{ if(btn){btn.classList.add('speaking');btn.classList.remove('listening');} setVoiceStatus(text.slice(0,40)+(text.length>40?'...':''),'speaking'); };
  utt.onend=()=>{ stopListening(); };
  synth.speak(utt);
}

async function handleVoiceCommand(transcript){
  stopListening();
  setVoiceStatus(`"${transcript}"`, 'active');
  addAgentMsg(`🎤 <em>${transcript}</em>`,'usr');

  // Build context
  const ctx=getCtx();
  const system=`Tu es la secrétaire vocale d'Orbit. Tu réponds en français, court et naturel (1-2 phrases max pour la voix).

${ctx}
Projets disponibles : ${projects.map((p,i)=>`${i}:${p.name}(${p.status})`).join(', ')||'aucun'}

Commandes — réponds UNIQUEMENT avec un JSON :
- Créer tâche : {"action":"create_task","title":"...","col":1,"tag":"Dev","priority":"medium","projIdx":0}
- Créer projet : {"action":"create_project","name":"..."}
- Créer CR : {"action":"create_report","title":"...","risks":"","comments":""}
- Terminer action : {"action":"set_action_done","keyword":"..."}
- Naviguer : {"action":"navigate","target":"dashboard|planning|cr|calendar|kanban"}
- Actions en retard : {"action":"get_overdue"}
- Note rapide : {"action":"add_note","text":"..."}
- Résumé/conseil : {"action":"speak","text":"ta réponse courte ici"}

JSON valide uniquement. Aucun texte hors du JSON.`;

  try{
    const res=await fetch(ANTHROPIC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-opus-4-7',max_tokens:400,system,messages:[{role:'user',content:transcript}]})});
    const data=await res.json();
    const raw=data.content?.map(b=>b.text||'').join('')||'{}';
    let parsed;
    try{ parsed=JSON.parse(raw.match(/\{[\s\S]*\}/)?.[0]||'{}'); }catch(e){ parsed={action:'speak',text:'Désolée, je n\'ai pas compris. Pouvez-vous répéter ?'}; }

    executeVoiceAction(parsed);
  }catch(e){
    speak('Désolée, je ne peux pas me connecter pour l\'instant.');
    addAgentMsg('Erreur de connexion API.','ag');
  }
}

function executeVoiceAction(cmd){
  const {action}=cmd;
  if(action==='create_task'){
    const pi=cmd.projIdx!==undefined?cmd.projIdx:activeP;
    const ci=Math.min(3,Math.max(0,cmd.col||1));
    projects[pi].columns[ci].cards.push({title:cmd.title,tag:cmd.tag||'Dev',priority:cmd.priority||'medium',members:[0]});
    if(navMode==='project'&&activeP===pi&&activeV==='kanban') renderVC();
    scheduleAutoSave();
    const reply=`Tâche "${cmd.title}" ajoutée dans ${projects[pi].name}.`;
    speak(reply); addAgentMsg(reply,'ag');

  }else if(action==='create_project'){
    const color=COLORS[projects.length%COLORS.length];
    projects.push({id:projects.length,name:cmd.name,color,status:'En cours',columns:[{title:'Backlog',cards:[]},{title:'À faire',cards:[]},{title:'En cours',cards:[]},{title:'Terminé',cards:[]}],reports:[]});
    renderSidebar(); selectProject(projects.length-1); scheduleAutoSave();
    const reply=`Projet "${cmd.name}" créé avec succès.`;
    speak(reply); addAgentMsg(reply,'ag');

  }else if(action==='create_report'){
    const d=new Date().toISOString().split('T')[0];
    projects[activeP].reports.unshift({id:Date.now(),title:cmd.title,date:d,risks:cmd.risks||'',comments:cmd.comments||'',actions:[],links:[]});
    if(activeV==='cr') renderVC(); scheduleAutoSave();
    const reply=`Compte rendu "${cmd.title}" créé dans ${projects[activeP].name}.`;
    speak(reply); addAgentMsg(reply,'ag');

  }else if(action==='set_action_done'){
    let found=false;
    projects.forEach(p=>p.reports.forEach(r=>(r.actions||[]).forEach(a=>{
      if(a.title.toLowerCase().includes(cmd.keyword.toLowerCase())&&!found){ a.status='done'; found=true; }
    })));
    if(found){ scheduleAutoSave(); if(activeV==='planning') renderVC(); }
    const reply=found?`Action marquée comme terminée.`:`Je n'ai pas trouvé d'action contenant "${cmd.keyword}".`;
    speak(reply); addAgentMsg(reply,'ag');

  }else if(action==='navigate'){
    const t=cmd.target;
    if(t==='dashboard') setNav('dashboard');
    else if(t==='planning') setNav('planning');
    else if(t==='cr') setNav('cr');
    else if(t==='calendar') setNav('calendar');
    else if(t==='kanban'){ navMode='project'; renderProjectMain(); }
    const labels={dashboard:'tableau de bord',planning:'planning global',cr:'comptes rendus',calendar:'calendrier',kanban:'Kanban'};
    const reply=`Je vous emmène sur le ${labels[t]||t}.`;
    speak(reply); addAgentMsg(reply,'ag');

  }else if(action==='get_overdue'){
    const all=projects.flatMap(p=>p.reports.flatMap(r=>(r.actions||[]).filter(a=>a.status!=='done'&&daysUntil(a.deadline)<0).map(a=>a.title)));
    const reply=all.length?`Vous avez ${all.length} action${all.length>1?'s':''} en retard : ${all.slice(0,3).join(', ')}${all.length>3?' et autres.':'.'}` :`Aucune action en retard, bravo !`;
    speak(reply); addAgentMsg(reply,'ag');

  }else if(action==='add_note'){
    quickNotes.unshift({text:cmd.text,date:new Date().toISOString()});
    saveQuickNotes(); renderQuickNotes();
    const reply=`Note ajoutée : "${cmd.text}".`;
    speak(reply); addAgentMsg(reply,'ag');

  }else if(action==='speak'){
    speak(cmd.text); addAgentMsg(cmd.text,'ag');
  }else{
    speak('Je n\'ai pas pu exécuter cette commande.'); addAgentMsg('Commande non reconnue.','ag');
  }
  updateSuggs();
}

async function detectRisks(){
  const p=projects[activeP];
  if(!p.reports.length){ addAgentMsg('Aucun compte rendu à analyser pour ce projet.','ag'); return; }

  const t=addAgentMsg('🔍 Analyse des risques en cours...','ag');
  const crTexts=p.reports.slice(0,10).map(r=>`CR "${r.title}" (${r.date}):\nRisques: ${r.risks||'aucun'}\nCommentaires: ${r.comments||'aucun'}`).join('\n\n');
  const actions=p.reports.flatMap(r=>(r.actions||[]).filter(a=>a.status!=='done'&&daysUntil(a.deadline)<0));

  try{
    const res=await fetch(ANTHROPIC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-anthropic-version':'2023-06-01'},body:JSON.stringify({
      model:'claude-opus-4-7',max_tokens:800,
      system:`Tu es un expert en gestion de projet. Analyse les comptes rendus et identifie les risques récurrents ou critiques. Réponds en français, de façon concise et structurée avec des bullet points. Max 6 risques identifiés.`,
      messages:[{role:'user',content:`Projet : ${p.name}\n\n${crTexts}\n\nActions en retard (${actions.length}): ${actions.map(a=>a.title).join(', ')||'aucune'}\n\nIdentifie les risques principaux et récurrents.`}]})});
    const data=await res.json(); t.remove();
    const raw=data.content?.map(b=>b.text||'').join('')||'Aucune analyse disponible.';
    addAgentMsg(`<strong>🔍 Risques détectés — ${p.name}</strong><br><br>${raw.replace(/\n/g,'<br>')}`, 'ag');
  }catch(e){ t.remove(); addAgentMsg('Erreur lors de l\'analyse.','ag'); }
}

// Auto risk detection on CR save — check for recurring risks
function autoDetectRisksOnSave(pi){
  const p=projects[pi];
  if(p.reports.length<2) return;
  // Look for same keywords in risks across multiple CRs
  const riskWords=p.reports.flatMap(r=>(r.risks||'').toLowerCase().split(/[\n,\.]/)).filter(w=>w.trim().length>5);
  const freq={};
  riskWords.forEach(w=>{ const k=w.trim(); if(k) freq[k]=(freq[k]||0)+1; });
  const recurring=Object.entries(freq).filter(([_,n])=>n>=2).map(([w])=>w).slice(0,3);
  if(recurring.length){
    const banner=document.getElementById('alert-banner');
    if(banner){
      banner.style.display='flex';
      banner.innerHTML=`<i class="ti ti-alert-triangle" style="color:var(--warn)"></i>
        <div class="alert-banner-items">
          <strong style="font-size:11px">Risques récurrents détectés :</strong>
          ${recurring.map(r=>`<span class="alert-pill" onclick="detectRisks()">${r}</span>`).join('')}
        </div>
        <button class="icon-btn" onclick="this.parentElement.style.display='none'"><i class="ti ti-x"></i></button>`;
    }
  }
}
