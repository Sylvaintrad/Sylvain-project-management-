async function generateWeeklyRecap(){
  addAgentMsg('📊 Génération du récapitulatif hebdomadaire...','ag');
  const t=document.querySelector('.msgs .msg:last-child');

  const allProjects=projects.filter(p=>!p.archived);
  const allActions=allProjects.flatMap((p,pi)=>p.reports.flatMap(r=>(r.actions||[]).map(a=>({...a,projName:p.name}))));
  const overdue=allActions.filter(a=>a.status!=='done'&&daysUntil(a.deadline)<0);
  const doneThisWeek=allActions.filter(a=>a.status==='done'&&daysUntil(a.deadline)>=-7);
  const upcoming=allActions.filter(a=>a.status!=='done'&&daysUntil(a.deadline)>=0&&daysUntil(a.deadline)<=7);

  const summary=allProjects.map(p=>{
    const total=p.columns.flatMap(c=>c.cards).length;
    const done=p.columns[3]?.cards.length||0;
    const pct=total?Math.round(done/total*100):0;
    const pOverdue=p.reports.flatMap(r=>r.actions||[]).filter(a=>a.status!=='done'&&daysUntil(a.deadline)<0);
    return`${p.name} (${p.status}) : ${total} tâches, ${pct}% complété${pOverdue.length?`, ${pOverdue.length} action(s) en retard`:''}`;
  }).join('\n');

  try{
    const res=await fetch(ANTHROPIC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-anthropic-version':'2023-06-01'},body:JSON.stringify({
      model:'claude-opus-4-7',max_tokens:1000,
      system:`Tu es la secrétaire IA d'Orbit. Génère un récapitulatif hebdomadaire professionnel et concis en français. Format : titre, points clés par section (Accompli, En cours, Alertes, Priorités semaine prochaine).`,
      messages:[{role:'user',content:`Génère le récapitulatif hebdomadaire pour la semaine du ${new Date().toLocaleDateString('fr-FR')}.\n\nProjets actifs :\n${summary}\n\nActions terminées cette semaine (${doneThisWeek.length}): ${doneThisWeek.map(a=>`${a.title} (${a.projName})`).join(', ')||'aucune'}\nActions en retard (${overdue.length}): ${overdue.map(a=>`${a.title} (${a.projName})`).join(', ')||'aucune'}\nDeadlines cette semaine (${upcoming.length}): ${upcoming.map(a=>`${a.title} — ${fmt(a.deadline)} (${a.projName})`).join(', ')||'aucune'}`}]})});
    const data=await res.json();
    if(t) t.remove();
    const raw=data.content?.map(b=>b.text||'').join('')||'Impossible de générer le récapitulatif.';
    addAgentMsg(`<strong>📊 Récapitulatif hebdomadaire</strong><br><br>${raw.replace(/\n/g,'<br>')}`, 'ag');
  }catch(e){ if(t) t.remove(); addAgentMsg('Erreur lors de la génération.','ag'); }
}

let transcriptContent = null;

function handleTranscriptDrop(e){
  e.preventDefault();
  document.getElementById('transcript-zone').style.background='';

async function handleTranscriptFile(file){
  if(!file) return;
  const zone=document.getElementById('transcript-zone');
  const nameEl=document.getElementById('transcript-name');
  zone.style.background='var(--accl)';
  nameEl.style.display='inline';
  nameEl.textContent='Chargement...';

  try{
    let text='';
    const ext=file.name.split('.').pop().toLowerCase();

    if(ext==='pdf'){
      text = await readPDFAsBase64(file);
      transcriptContent = {type:'pdf', data:text, name:file.name};
    } else if(ext==='docx'||ext==='doc'){
      // Read DOCX as base64 and send as document to Claude
      text = await readPDFAsBase64(file); // same base64 reader
      transcriptContent = {type:'docx', data:text, name:file.name};
    } else {
      text = await readAsText(file);
      transcriptContent = {type:'text', data:text, name:file.name};
    }

    zone.style.background='var(--accl)';
    nameEl.textContent='✓ '+file.name.slice(0,22)+(file.name.length>22?'...':'');
    nameEl.style.color='var(--ok)';

    addAgentMsg(`📄 Fichier chargé : <strong>${file.name}</strong>
      <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">
        <button class="btn pri" style="font-size:10px;padding:3px 8px" onclick="analyzeTranscript('cr')"><i class="ti ti-notebook" style="font-size:10px"></i>Créer un CR</button>
        <button class="btn" style="font-size:10px;padding:3px 8px" onclick="analyzeTranscript('actions')"><i class="ti ti-checkbox" style="font-size:10px"></i>Extraire les actions</button>
        <button class="btn" style="font-size:10px;padding:3px 8px" onclick="analyzeTranscript('summary')"><i class="ti ti-list" style="font-size:10px"></i>Résumé</button>
        <button class="btn" style="font-size:10px;padding:3px 8px" onclick="clearTranscript()"><i class="ti ti-x" style="font-size:10px"></i>Effacer</button>
      </div>`, 'ag');
  } catch(err){
    nameEl.textContent='Erreur de lecture';
    nameEl.style.color='var(--err)';
    zone.style.background='';
    addAgentMsg('Impossible de lire ce fichier. Formats supportés : .txt, .md, .pdf, .docx','ag');
  }
}

function readAsText(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.onerror=reject;
    reader.readAsText(file,'UTF-8');
  });
}

function readPDFAsBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const base64=e.target.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function clearTranscript(){
  transcriptContent=null;
  const zone=document.getElementById('transcript-zone');

  zone.style.background='';
  nameEl.style.display='none';
  nameEl.textContent='';

async function analyzeTranscript(mode){
  if(!transcriptContent){ addAgentMsg('Aucun transcript chargé.','ag'); return; }
  const p=projects[activeP];
  const t=addAgentMsg('🔍 Analyse du transcript en cours...','ag');

  const prompts={
    cr:`Analyse ce transcript et génère un compte rendu structuré pour le projet "${p.name}".
Réponds UNIQUEMENT avec ce JSON :
{"action":"create_report","title":"Titre du CR","risks":"risques identifiés","comments":"résumé des points clés et décisions","actions":[{"title":"action","assignee":"AL","deadline":"${new Date(Date.now()+7*86400000).toISOString().split('T')[0]}","status":"todo"}]}`,
    actions:`Analyse ce transcript et extrais UNIQUEMENT les actions à faire pour le projet "${p.name}".
Réponds avec ce JSON :
{"action":"create_tasks","tasks":[{"title":"titre de la tâche","col":1,"tag":"Dev","priority":"medium"}]}
col: 0=Backlog, 1=À faire, 2=En cours, 3=Terminé`,
    summary:`Fais un résumé clair et structuré de ce transcript en français. Points abordés, décisions prises, personnes mentionnées, prochaines étapes. Max 15 lignes.`
  };

  try{
    let messages;
    if(transcriptContent.type==='pdf'||transcriptContent.type==='docx'){
      const mimeType=transcriptContent.type==='pdf'?'application/pdf':'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
      messages=[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:mimeType,data:transcriptContent.data}},
        {type:'text',text:prompts[mode]}
      ]}];
    } else {
      messages=[{role:'user',content:`${prompts[mode]}\n\n--- TRANSCRIPT ---\n${transcriptContent.data.slice(0,15000)}`}];
    }

    const res=await fetch(ANTHROPIC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-opus-4-7',max_tokens:1500,system:`Tu es la secrétaire IA d'Orbit. Projet actif : ${p.name}. Réponds en français.`,messages})});
    const data=await res.json();
    t.remove();
    const raw=data.content?.map(b=>b.text||'').join('')||'Erreur.';

    if(mode==='summary'){
      addAgentMsg(`<strong>📋 Résumé du transcript</strong><br><br>${raw.replace(/\n/g,'<br>')}`, 'ag');
      return;
    }

    const jm=raw.match(/\{[\s\S]*?\}/);
    if(jm){
      try{
        const parsed=JSON.parse(jm[0]);
        if(parsed.action==='create_report'){
          p.reports.unshift({id:Date.now(),title:parsed.title,date:new Date().toISOString().split('T')[0],risks:parsed.risks||'',comments:parsed.comments||'',actions:parsed.actions||[],links:[]});
          if(activeV==='cr') renderVC();
          scheduleAutoSave();
          addAgentMsg(`✅ CR <strong>${parsed.title}</strong> créé avec ${(parsed.actions||[]).length} action(s) depuis le transcript.`,'ag');
        } else if(parsed.action==='create_tasks'&&parsed.tasks){
          parsed.tasks.forEach(task=>{
            p.columns[Math.min(3,Math.max(0,task.col||1))].cards.push({title:task.title,tag:task.tag||'Dev',priority:task.priority||'medium',members:[0],desc:'',comments:[]});
          });
          if(activeV==='kanban') renderVC();
          scheduleAutoSave();
          addAgentMsg(`✅ ${parsed.tasks.length} tâche(s) ajoutée(s) au Kanban depuis le transcript.`,'ag');
        }
      }catch(e){ addAgentMsg(raw.replace(/\n/g,'<br>'),'ag'); }
    } else { addAgentMsg(raw.replace(/\n/g,'<br>'),'ag'); }
  }catch(e){ t.remove(); addAgentMsg('Erreur lors de l\'analyse.','ag'); }
}

// ─── NOTIFICATIONS ────────────────────────────────────────────
function updateNotifDot(){
  const dot=document.getElementById('notif-dot');
  if(dot) dot.style.display=notifSettings.enabled?'block':'none';
}

function openNotifSettings(){
  document.getElementById('notif-modal').style.display='flex';
  document.getElementById('notif-body').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem;background:var(--bg2);border-radius:var(--r)">
        <div>
          <div style="font-size:13px;font-weight:600">Activer les notifications</div>
          <div style="font-size:11px;color:var(--tx3)">Rappels pour les deadlines proches</div>
        </div>
        <label style="cursor:pointer;display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="notif-enabled" ${notifSettings.enabled?'checked':''} onchange="notifSettings.enabled=this.checked;saveNotifSettings()" style="width:16px;height:16px;accent-color:var(--acc)"/>
          <span style="font-size:12px">${notifSettings.enabled?'Activé':'Désactivé'}</span>
        </label>
      </div>
      <div>
        <div class="flbl"><i class="ti ti-clock"></i>Heure de notification quotidienne</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" class="fi" id="notif-hour" min="0" max="23" value="${notifSettings.hour}" style="width:80px" onchange="notifSettings.hour=+this.value;saveNotifSettings()"/>
          <span style="font-size:14px;font-weight:500">h</span>
          <input type="number" class="fi" id="notif-min" min="0" max="59" value="${notifSettings.minute}" style="width:80px" onchange="notifSettings.minute=+this.value;saveNotifSettings()"/>
        </div>
      </div>
      <div>
        <div class="flbl"><i class="ti ti-calendar-due"></i>M'alerter quand la deadline est dans</div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" class="fi" min="0" max="14" value="${notifSettings.daysBefore}" style="width:80px" onchange="notifSettings.daysBefore=+this.value;saveNotifSettings()"/>
          <span style="font-size:13px">jour(s) ou moins</span>
        </div>
      </div>
      <button class="btn pri" style="justify-content:center" onclick="testNotification()"><i class="ti ti-bell-ringing"></i>Tester une notification</button>
      <div style="font-size:11px;color:var(--tx3);background:var(--bg2);padding:.75rem;border-radius:var(--r)">
        <i class="ti ti-info-circle" style="margin-right:4px"></i>Les notifications fonctionnent quand Orbit est ouvert dans votre navigateur. Vous devrez autoriser les notifications au premier clic.
      </div>
    </div>`;
}

function saveNotifSettings(){
  localStorage.setItem('orbit-notif',JSON.stringify(notifSettings));
  updateNotifDot();
  clearInterval(notifTimer);
  if(notifSettings.enabled) initNotifications();
}

function initNotifications(){
  if(!notifSettings.enabled) return;
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  clearInterval(notifTimer);
  // Check every minute
  notifTimer=setInterval(checkDeadlineNotifications, 60000);
  checkDeadlineNotifications();
}

function checkDeadlineNotifications(){
  if(!notifSettings.enabled) return;
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const now=new Date();
  if(now.getHours()!==notifSettings.hour||now.getMinutes()!==notifSettings.minute) return;
  const urgent=projects.flatMap(p=>p.reports.flatMap(r=>(r.actions||[]).filter(a=>a.status!=='done'&&daysUntil(a.deadline)>=0&&daysUntil(a.deadline)<=notifSettings.daysBefore).map(a=>({...a,projName:p.name}))));
  const overdue=projects.flatMap(p=>p.reports.flatMap(r=>(r.actions||[]).filter(a=>a.status!=='done'&&daysUntil(a.deadline)<0).map(a=>({...a,projName:p.name}))));
  if(urgent.length||overdue.length){
    new Notification('⏰ Orbit — Deadlines', {
      body: `${overdue.length?overdue.length+' action(s) en retard. ':''}${urgent.length?urgent.length+' deadline(s) proche(s).':''}`,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%236C5CE7"/><text y="22" x="7" font-size="18">🚀</text></svg>'
    });
  }
}

function testNotification(){
  if(!('Notification' in window)){ alert('Notifications non supportées sur ce navigateur.'); return; }
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      new Notification('✅ Orbit — Test réussi !', {body:'Les notifications fonctionnent correctement.'});
    } else {
      alert('Permission refusée. Autorisez les notifications dans les paramètres de votre navigateur.');
    }
  });
}

function openMemoryPanel(){
  document.getElementById('memory-modal').style.display='flex';

}

function renderMemoryPanel(){

  if(!aiMemory.length){
    el.innerHTML=`<div class="empty" style="padding:1.5rem"><i class="ti ti-brain" style="font-size:28px"></i><p>Aucun souvenir.<br>Cliquez sur "Mettre à jour" pour extraire les décisions importantes de vos CR.</p></div>`;

  }
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">

    </div>`).join('')}

async function extractMemory(){
  const el=document.getElementById('memory-body');
  if(el) el.innerHTML=`<div class="empty" style="padding:1.5rem"><i class="ti ti-loader spin" style="font-size:28px"></i><p>Extraction en cours...</p></div>`;
  const allCRs=projects.filter(p=>!p.archived).flatMap(p=>p.reports.slice(0,5).map(r=>({proj:p.name,title:r.title,date:r.date,risks:r.risks||'',comments:r.comments||''})));
  if(!allCRs.length){ if(el) el.innerHTML=`<div class="empty" style="padding:1rem"><p>Aucun CR disponible.</p></div>`; return; }
  try{
    const res=await fetch(ANTHROPIC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-anthropic-version':'2023-06-01'},body:JSON.stringify({
      model:'claude-opus-4-7',max_tokens:1000,
      system:`Extrais les décisions importantes, risques clés et points d'attention des comptes rendus. Réponds UNIQUEMENT en JSON :
{"memories":[{"type":"decision|risk|insight","text":"texte court max 80 chars","project":"nom du projet","date":"date"}]}
Maximum 10 éléments, les plus importants uniquement.`,
      messages:[{role:'user',content:allCRs.map(cr=>`[${cr.proj} - ${cr.title} - ${cr.date}]\nDécisions/commentaires: ${cr.comments.slice(0,200)}\nRisques: ${cr.risks.slice(0,150)}`).join('\n\n')}]})});
    const data=await res.json();
    const raw=data.content?.map(b=>b.text||'').join('')||'{}';
    const jm=raw.match(/\{[\s\S]*\}/);
    if(jm){
      const parsed=JSON.parse(jm[0]);
      if(parsed.memories){
        aiMemory=[...parsed.memories,...aiMemory].slice(0,20);
        localStorage.setItem('orbit-memory',JSON.stringify(aiMemory));
        renderMemoryPanel();
        addAgentMsg(`<i class="ti ti-brain" style="color:var(--acc)"></i> <strong>${parsed.memories.length} souvenir${parsed.memories.length>1?'s':''}</strong> extrait${parsed.memories.length>1?'s':''} de vos CR.`,'ag');
      }
    }
  }catch(e){ if(el) el.innerHTML=`<div class="empty" style="padding:1rem"><p>Erreur lors de l'extraction.</p></div>`; }
}

// Inject memory into AI context
function getMemoryContext(){
  if(!aiMemory.length) return '';
  return `\nMémoire IA (décisions et risques passés) :\n${aiMemory.slice(0,8).map(m=>`- [${m.type}] ${m.text} (${m.project}, ${m.date})`).join('\n')}\n`;
}

// ─── DEPENDENCY DETECTION ─────────────────────────────────────
async function detectDependencies(){
  const p=projects[activeP];
  const allCards=p.columns.flatMap((col,ci)=>col.cards.map((c,idx)=>({title:c.title,ci,idx,col:col.title})));
  if(allCards.length<3){ addAgentMsg('Pas assez de tâches pour détecter des dépendances.','ag'); return; }
  const t=addAgentMsg('🔗 Analyse des dépendances en cours...','ag');
  try{
    const res=await fetch(ANTHROPIC_URL,{method:'POST',headers:{'Content-Type':'application/json','x-anthropic-version':'2023-06-01'},body:JSON.stringify({
      model:'claude-opus-4-7',max_tokens:600,
      system:`Tu es expert en gestion de projet. Analyse les tâches et identifie les dépendances logiques (quelle tâche doit être faite avant une autre). Réponds en JSON :
{"dependencies":[{"blocker":"titre exact de la tâche bloquante","blocked":"titre exact de la tâche bloquée","reason":"raison courte"}]}
Uniquement les dépendances évidentes et importantes.`,
      messages:[{role:'user',content:`Tâches du projet "${p.name}" :\n${allCards.map(c=>`- [${c.col}] ${c.title}`).join('\n')}`}]})});
    const data=await res.json(); t.remove();
    const raw=data.content?.map(b=>b.text||'').join('')||'{}';
    const jm=raw.match(/\{[\s\S]*\}/);
    if(jm){
      const parsed=JSON.parse(jm[0]);
      if(parsed.dependencies?.length){
        // Apply dependencies
        let applied=0;
        parsed.dependencies.forEach(dep=>{
          const blocker=allCards.find(c=>c.title===dep.blocker);
          const blocked=allCards.find(c=>c.title===dep.blocked);
          if(blocker&&blocked){
            const card=p.columns[blocked.ci].cards[blocked.idx];
            card.deps=card.deps||[];
            const key=`${blocker.ci}-${blocker.idx}`;
            if(!card.deps.includes(key)){ card.deps.push(key); applied++; }
          }
        });
        scheduleAutoSave(); renderVC();
        addAgentMsg(`<strong>🔗 ${parsed.dependencies.length} dépendance${parsed.dependencies.length>1?'s':''} détectée${parsed.dependencies.length>1?'s':''}${applied>0?`, ${applied} appliquée${applied>1?'s':''}`:' (déjà connues)'}.</strong><br>${parsed.dependencies.map(d=>`<span style="font-size:10px">⚠ <em>${d.blocked}</em> nécessite <em>${d.blocker}</em></span>`).join('<br>')}`, 'ag');
      } else {
        addAgentMsg('Aucune dépendance évidente détectée entre les tâches.','ag');
      }
    }
  }catch(e){ t.remove(); addAgentMsg('Erreur lors de l\'analyse.','ag'); }
}

// ─── PWA ──────────────────────────────────────────────────────
function installPWA(){
  // Inject manifest dynamically
  const manifest={
    name:'Orbit — Gestion de projet',
    short_name:'Orbit',
    description:'App de gestion de projet personnelle avec IA',
    start_url:location.pathname,
    display:'standalone',
    background_color:'#f0effe',
    theme_color:'#6C5CE7',
    orientation:'portrait-primary',
    icons:[
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%236C5CE7"/><text y="130" x="30" font-size="120">🚀</text></svg>',sizes:'192x192',type:'image/svg+xml'},
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="%236C5CE7"/><text y="350" x="80" font-size="320">🚀</text></svg>',sizes:'512x512',type:'image/svg+xml'}
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const url=URL.createObjectURL(blob);
  const link=document.getElementById('pwa-manifest');
  if(link) link.href=url;

  // Register service worker for offline support
  if('serviceWorker' in navigator){
    const swCode=`
const CACHE='orbit-v1';
const ASSETS=['${location.pathname}','https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;})));});
    `;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }

  // Install prompt
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault(); deferredPrompt=e;
    // Show install button in sidebar
    const foot=document.querySelector('.sb-foot');
    if(foot&&!document.getElementById('install-btn')){
      const btn=document.createElement('div');
      btn.id='install-btn';
      btn.className='sb-item';
      btn.style.background='linear-gradient(135deg,var(--accl),rgba(253,121,168,.1))';
      btn.innerHTML='<i class="ti ti-download" style="color:var(--acc)"></i><span style="color:var(--acc);font-weight:600">Installer Orbit</span>';
      btn.onclick=()=>{ deferredPrompt?.prompt(); deferredPrompt=null; btn.remove(); };
      foot.prepend(btn);
    }
  });
}

// ─── MOBILE ───────────────────────────────────────────────────
function isMobile(){ return window.innerWidth<=768; }

function toggleMobileSidebar(){
  const sb=document.querySelector('.sb');
  const overlay=document.getElementById('sb-overlay');
  const isOpen=sb.classList.contains('open');
  sb.classList.toggle('open',!isOpen);
  overlay.classList.toggle('open',!isOpen);
}
function closeMobileSidebar(){
  document.querySelector('.sb')?.classList.remove('open');
  document.getElementById('sb-overlay')?.classList.remove('open');
}

function toggleMobileAgent(){
  const agent=document.querySelector('.agent');
  if(!agent) return;
  const isOpen=agent.classList.contains('open');
  agent.classList.toggle('open',!isOpen);
  agent.style.display='flex';
  document.getElementById('mnav-ai')?.classList.toggle('active',!isOpen);
  if(!isOpen) setTimeout(()=>document.getElementById('chat-in')?.focus(),300);
}

function mobileNav(section){
  closeMobileSidebar();
  document.querySelector('.agent')?.classList.remove('open');
  ['board','dash','plan','ai'].forEach(k=>document.getElementById('mnav-'+k)?.classList.remove('active'));
  document.getElementById('mnav-'+section)?.classList.add('active');
  if(section==='board'){ navMode='project'; renderProjectMain(); }
  else if(section==='dash'){ setNav('dashboard'); }
  else if(section==='plan'){ setNav('planning'); }
}

// Close agent when tapping outside on mobile
document.addEventListener('click',e=>{
  if(!isMobile()) return;
  const agent=document.querySelector('.agent');
  if(agent?.classList.contains('open')&&!agent.contains(e.target)&&!document.getElementById('mnav-ai')?.contains(e.target)){
    agent.classList.remove('open');
    document.getElementById('mnav-ai')?.classList.remove('active');
  }
});

// Close sidebar when selecting a project on mobile
const origSelectProject=selectProject;
function selectProject(i){
  origSelectProject(i);
  if(isMobile()) closeMobileSidebar();
}

// Pre-load voices
if(synth) synth.onvoiceschanged=()=>synth.getVoices();

// ─── START ────────────────────────────────────────────────────
init();
